<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Transcript Summary - V.10 (Ultimate Stability)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; transition: all 0.3s ease; }
        .loading-spinner { border-top-color: #2563eb; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0, 1, 0, 1); }
        .accordion-open .accordion-content { max-height: 2000px; transition: max-height 0.4s ease-in-out; }
        .rotate-icon { transition: transform 0.3s ease; }
        .accordion-open .rotate-icon { transform: rotate(180deg); }
        .sentiment-positive { border-left: 8px solid #22c55e !important; }
        .sentiment-negative { border-left: 8px solid #ef4444 !important; }
        .sentiment-neutral { border-left: 8px solid #94a3b8 !important; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen text-slate-800 pb-20">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
            <div>
                <div class="flex items-center gap-2 mb-1">
                    <span class="px-2 py-1 bg-orange-500 text-white text-[10px] font-bold rounded-md uppercase">SCG WEDO</span>
                    <h1 class="text-2xl font-bold tracking-tight text-slate-900">Transcript Summarizer Pro</h1>
                </div>
                <p class="text-slate-500 text-sm italic">วิเคราะห์เชิงลึกด้วย do-gemini-3-flash-preview</p>
            </div>
            <div class="w-full md:w-auto">
                <input type="password" id="apiKey" placeholder="วาง Bearer Token ตรงนี้..." 
                    class="w-full md:w-80 px-4 py-3 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none shadow-inner bg-slate-50">
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 sticky top-8">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-semibold flex items-center text-slate-700 font-bold uppercase text-xs tracking-widest">
                            <svg class="w-4 h-4 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            รายการไฟล์
                        </h2>
                        <button onclick="clearAllFiles()" class="text-[10px] font-bold text-red-400 hover:text-red-600 transition-colors flex items-center gap-1">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            ล้างทั้งหมด
                        </button>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="group relative border-2 border-dashed border-slate-200 rounded-2xl p-4 hover:border-blue-400 transition-all bg-slate-50/50">
                            <input type="file" id="jsonInput" accept=".json" multiple class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                            <div class="text-center py-1">
                                <p class="text-sm font-semibold text-slate-600">+ เพิ่มไฟล์ JSON</p>
                            </div>
                        </div>
                        <div id="fileListDisplay" class="space-y-2 max-h-60 overflow-y-auto pr-1">
                            <p class="text-center text-slate-400 text-xs py-6">ยังไม่มีไฟล์ในรายการ</p>
                        </div>
                        <button onclick="processAllFiles()" id="btnAnalyze" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold transition-all transform hover:scale-[1.01] active:scale-95 shadow-xl flex justify-center items-center gap-2">
                            เริ่มสรุป <span id="fileBadge" class="bg-blue-400 px-1.5 rounded ml-1">0</span> ไฟล์
                        </button>
                    </div>
                </div>
            </div>

            <div id="resultArea" class="lg:col-span-8 hidden">
                <div id="loading" class="hidden flex flex-col items-center justify-center p-20 bg-white rounded-3xl border border-slate-200 shadow-sm mb-6">
                    <div class="loading-spinner border-4 border-slate-100 rounded-full w-12 h-12 mb-4"></div>
                    <h3 id="progressText" class="text-sm font-bold text-slate-600 animate-pulse">กำลังวิเคราะห์...</h3>
                </div>
                <div id="resultsContainer" class="space-y-6"></div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "https://do-cap-litellm-dev.scg-wedo.tech".replace(/\/$/, ""); 
        let fileQueue = [];

        document.getElementById('jsonInput').addEventListener('change', (e) => {
            const newFiles = Array.from(e.target.files);
            fileQueue = [...fileQueue, ...newFiles];
            renderFileList();
            e.target.value = '';
        });

        function renderFileList() {
            const display = document.getElementById('fileListDisplay');
            const badge = document.getElementById('fileBadge');
            badge.innerText = fileQueue.length;
            if (fileQueue.length === 0) {
                display.innerHTML = `<p class="text-center text-slate-400 text-xs py-6 italic">ยังไม่มีไฟล์ในรายการ</p>`;
                return;
            }
            display.innerHTML = fileQueue.map((file, index) => `
                <div class="flex items-center justify-between p-3 bg-slate-50 border border-slate-100 rounded-xl group transition-all">
                    <p class="text-xs font-medium text-slate-600 truncate mr-2">${file.name}</p>
                    <button onclick="removeFile(${index})" class="text-slate-300 hover:text-red-500 transition-colors shrink-0">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
            `).join('');
        }

        function removeFile(index) {
            fileQueue.splice(index, 1);
            renderFileList();
        }

        // ล้างรายการไฟล์ทันทีโดยไม่มี Popup
        window.clearAllFiles = function() {
            fileQueue = [];
            renderFileList();
        }

        async function processAllFiles() {
            const key = document.getElementById('apiKey').value;
            if (!key) return alert("กรุณาระบุ Token ก่อนครับ");
            if (fileQueue.length === 0) return alert("กรุณาเลือกไฟล์ก่อนครับ");

            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('loading').classList.remove('hidden');
            const container = document.getElementById('resultsContainer');
            container.innerHTML = ""; 

            for (let file of fileQueue) {
                document.getElementById('progressText').innerText = `กำลังวิเคราะห์: ${file.name}`;
                const fileId = 'file-' + Math.random().toString(36).substr(2, 9);
                try {
                    const content = await file.text();
                    const summary = await getAISummary(content, key);
                    renderSummaryCard(container, fileId, summary, file.name);
                } catch (err) {
                    renderErrorCard(container, file.name, err.message);
                }
            }
            document.getElementById('loading').classList.add('hidden');
        }

        async function getAISummary(content, key) {
            const response = await fetch(`${BASE_URL}/v1/chat/completions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                body: JSON.stringify({
                    model: "do-gemini-3-flash-preview", 
                    messages: [
                        { role: "system", content: "สรุปบทสนทนาเป็น JSON ภาษาไทย: { \"intent\": \"หัวข้อสรุป\", \"category\": \"หมวดหมู่\", \"bullets\": [\"ประเด็นย่อย\"], \"sentiment\": \"บวก/ลบ/ปกติ\", \"score\": \"1-5\" }" },
                        { role: "user", content: content }
                    ],
                    response_format: { type: "json_object" }
                })
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error?.message || "Error");
            return JSON.parse(data.choices[0].message.content);
        }

        function renderSummaryCard(container, id, data, filename) {
            // Ultimate Stability Fix: ตรวจสอบ Key ทุกรูปแบบที่ AI อาจส่งมาผิดพลาด
            const intent = data.intent || data.summary || data.topic || data.title || "ไม่สามารถสรุปหัวข้อได้";
            const sentimentStr = (data.sentiment || "ปกติ").toString();
            const bullets = Array.isArray(data.bullets) ? data.bullets : (Array.isArray(data.points) ? data.points : []);
            const score = data.score || data.satisfaction_score || "-";
            const category = data.category || "ทั่วไป";

            const sentimentClass = sentimentStr.includes('ลบ') ? 'sentiment-negative' : (sentimentStr.includes('บวก') ? 'sentiment-positive' : 'sentiment-neutral');
            
            const card = document.createElement('div');
            card.id = id;
            card.className = `bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden mb-6 transition-all ${sentimentClass}`;
            card.innerHTML = `
                <div class="p-6 flex flex-col md:flex-row justify-between items-start md:items-center bg-white cursor-pointer hover:bg-slate-50 transition-colors gap-4" onclick="this.parentElement.classList.toggle('accordion-open')">
                    <div class="flex flex-col gap-2 flex-grow min-w-0">
                        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest block">ไฟล์: ${filename}</span>
                        <div class="flex flex-wrap items-center gap-2">
                            <span class="px-2 py-1 bg-slate-900 text-white text-[10px] font-bold rounded uppercase whitespace-nowrap">${category}</span>
                            <h3 id="title-${id}" class="font-bold text-slate-700 text-lg leading-tight break-words">${intent}</h3>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 shrink-0 self-end md:self-center">
                        <button onclick="event.stopPropagation(); copyTitleOnly('${id}')" class="px-4 py-2 bg-blue-50 text-blue-600 rounded-xl text-xs font-bold hover:bg-blue-600 hover:text-white transition-all shadow-sm">Copy</button>
                        <svg class="w-5 h-5 text-slate-300 rotate-icon transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>

                <div class="accordion-content border-t border-slate-100 bg-slate-50/30">
                    <div class="p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2 space-y-4">
                            <h4 class="text-[10px] font-black text-slate-300 uppercase tracking-widest">สรุปใจความสำคัญ</h4>
                            <ul class="space-y-4">
                                ${bullets.length > 0 
                                    ? bullets.map(b => `<li class="flex items-start gap-3 text-slate-600 text-sm leading-relaxed"><span class="mt-2 w-1.5 h-1.5 bg-orange-400 rounded-full shrink-0"></span> ${b}</li>`).join('')
                                    : '<li class="text-slate-400 italic text-sm">AI ไม่พบประเด็นสำคัญในไฟล์นี้</li>'}
                            </ul>
                        </div>
                        <div class="bg-white rounded-2xl p-6 space-y-4 border border-slate-100 shadow-sm self-start">
                            <div><p class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">อารมณ์</p><p class="text-sm font-bold text-slate-700">${sentimentStr}</p></div>
                            <div><p class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">ความพึงพอใจ</p><p class="text-sm font-bold text-orange-500">${score}/5</p></div>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        }

        function renderErrorCard(container, filename, msg) {
            const div = document.createElement('div');
            div.className = "p-4 bg-red-50 text-red-600 rounded-xl text-[11px] font-bold border border-red-100 mb-4 shadow-sm italic";
            div.innerText = `⚠️ วิเคราะห์ไฟล์ไม่สำเร็จ (${filename}): ${msg}`;
            container.appendChild(div);
        }

        window.copyTitleOnly = function(id) {
            const titleElement = document.getElementById(`title-${id}`);
            if (!titleElement) return;
            const title = titleElement.innerText;
            navigator.clipboard.writeText(title).then(() => {
                const btn = document.querySelector(`#${id} button`);
                const oldText = btn.innerText;
                btn.innerText = "Copied!";
                btn.className = "px-4 py-2 bg-green-500 text-white rounded-xl text-xs font-bold transition-all";
                setTimeout(() => { 
                    btn.innerText = oldText; 
                    btn.className = "px-4 py-2 bg-blue-50 text-blue-600 rounded-xl text-xs font-bold hover:bg-blue-600 hover:text-white transition-all";
                }, 1500);
            });
        }
    </script>
</body>
</html>
